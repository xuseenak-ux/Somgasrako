<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMGAS RAKO</title>
    <style>
        /* Main Page Setup */
        body {
            background-color: #0d2611; /* Green gradient fallback */
            background: linear-gradient(180deg, #051407 0%, #0d2c14 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* App Container Card */
        .app-card {
            background-color: #1a1a1a;
            border-radius: 16px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Flame Icon Styling */
        .logo-container {
            font-size: 45px;
            background: rgba(0, 230, 118, 0.1);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
        }

        /* Typography */
        h1 {
            color: #00E676;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .section-title {
            color: #00E676;
            font-size: 13px;
            text-align: left;
            padding-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            opacity: 0.9;
        }

        /* Beautiful Dynamic Buttons */
        .gas-btn {
            background-color: #053412;
            color: white;
            border: none;
            border-radius: 8px;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .gas-btn:active {
            transform: scale(0.98);
            background-color: #084d1b;
        }

        /* Image styling inside buttons */
        .btn-img {
            width: 25px;
            height: 25px;
            margin-right: 12px;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Section Divider Line */
        .divider {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        /* Bottom Instructional Text */
        .footer-text {
            color: #888888;
            font-size: 12px;
            line-height: 1.5;
            margin-top: 20px;
            padding: 0 10px;
        }

        /* THE POP-UP DIALOGUE (MODAL) */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center; 
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1e1e1e;
            color: white;
            padding: 25px;
            border-radius: 14px;
            text-align: center;
            width: 80%;
            max-width: 290px;
            border: 1px solid #00E676;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 {
            margin-top: 0;
            color: #ffffff;
            font-size: 18px;
        }

        .modal p {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 15px;
        }

        /* The Box Displaying the Sahal String */
        .ussd-code-box {
            background-color: #000000;
            color: #00E676;
            font-size: 20px;
            font-weight: bold;
            padding: 14px;
            margin: 15px 0;
            border-radius: 8px;
            letter-spacing: 1px;
            border: 1px solid #222;
        }

        .close-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 10px 24px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <div class="logo-container">🔥</div>
        <h1>SOMGAS RAKO</h1>
        <div class="subtitle">Dooro nooca gaaska aad rabto.</div>

        <div class="section-title">Haamaha Gaaska</div>
        
        <button class="gas-btn" data-ussd="*712*YOUR_MERCHANT_NUMBER*37#">
            <img src="haam.png" alt="" class="btn-img" onerror="this.style.display='none'">
            20 KG - $37
        </button>
        
        <button class="gas-btn" data-ussd="*712*YOUR_MERCHANT_NUMBER*26#">
            <img src="haam.png" alt="" class="btn-img" onerror="this.style.display='none'">
            13 KG - $26
        </button>
        
        <button class="gas-btn" data-ussd="*712*YOUR_MERCHANT_NUMBER*12#">
            <img src="haam.png" alt="" class="btn-img" onerror="this.style.display='none'">
            6 KG - $12
        </button>

        <hr class="divider">

        <div class="section-title">Agabka Kale</div>
        
        <button class="gas-btn" data-ussd="*712*YOUR_MERCHANT_NUMBER*38#">
            <img src="cooker.png" alt="" class="btn-img" onerror="this.style.display='none'">
            Cooker - $38
        </button>
        
        <button class="gas-btn" data-ussd="*712*YOUR_MERCHANT_NUMBER*8#">
            <img src="regulator.png" alt="" class="btn-img" onerror="this.style.display='none'">
            Regulator - $8
        </button>

        <div class="footer-text">
            Lacagta waxaa lagu bixinayaa SAHAL. Marka gujisid haanta aad rabtid, 
            waxaa si toos ah laguugu diyaarinayaa habka lacag dirista.
        </div>

    </div>

    <div id="ussdModal" class="modal">
        <div class="modal-content">
            <h3>Habka Lacag Bixinta</h3>
            <p>Fadlan telefoonkaaga ka wac lambarkan hoose si aad u bixiso lacagta:</p>
            <div class="ussd-code-box" id="ussdDisplay"></div>
            <button onclick="closeModal()" class="close-btn">Xir</button>
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.gas-btn');
        const modal = document.getElementById('ussdModal');
        const ussdDisplay = document.getElementById('ussdDisplay');

        // Loop through all buttons and assign automatic modal trigger
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const ussdCode = button.getAttribute('data-ussd');
                ussdDisplay.innerText = ussdCode;
                modal.style.display = 'flex';
            });
        });

        // Close the modal function
        function closeModal() {
            modal.style.display = 'none';
        }

        // Close the window if the user clicks anywhere outside the dark box
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>

</body>
</html>
